# Set the actions' name
name: Yaml File Linter

# Event trigger
on:
  push:
    branches:
        - "main"
        - "hotfix/**"

jobs:
    pull_repo:
        runs-on: ubuntu-latest
        steps:
          - name: Pull my repository
            uses: actions/checkout@v6
          - name: Collection info
            run: |
              ls -la
              lsb_release -a
    
    repo_info:
        needs: pull_repo
        runs-on: ubuntu-latest
        steps:
            - name: Generating repos data
              env:
                GITHUB_CONTEXT: ${{ toJSON(github) }}
              run: echo "$GITHUB_CONTEXT"
