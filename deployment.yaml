apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-deployment
  labels:
    app1: uct4
    managed-by: terraform
    deployed-version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: example
  template:
    metadata:
      labels:
        app: example
    spec:
      containers:
      - name: example-container
        image: example-image
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m" 